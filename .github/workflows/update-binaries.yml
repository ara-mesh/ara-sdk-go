name: update-binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'ara release tag (e.g. v1.2.3)'
        required: true
  repository_dispatch:
    types: [new-engine-release]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download libaraengine binaries from ara release
        env:
          GH_TOKEN: ${{ secrets.ARA_ENGINE_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          echo "Downloading libaraengine $VERSION"
          gh release download "$VERSION" \
            --repo ara-mesh/ara \
            --dir /tmp/engine-bins \
            --pattern 'libaraengine*'
          mkdir -p lib/darwin_arm64 lib/linux_arm64 lib/linux_amd64
          for f in /tmp/engine-bins/*; do
            fname=$(basename "$f")
            ext="${fname##*.}"
            case "$fname" in
              *-darwin-arm64.*) cp "$f" "lib/darwin_arm64/libaraengine.${ext}" ;;
              *-linux-arm64.*)  cp "$f" "lib/linux_arm64/libaraengine.${ext}"  ;;
              *-linux-amd64.*)  cp "$f" "lib/linux_amd64/libaraengine.${ext}"  ;;
            esac
          done

      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update libaraengine to ${{ github.event.inputs.version || github.event.client_payload.version }}"
          title: "chore: update libaraengine to ${{ github.event.inputs.version || github.event.client_payload.version }}"
          branch: "update-engine-${{ github.event.inputs.version || github.event.client_payload.version }}"
          body: |
            Automated binary update from [ara release ${{ github.event.inputs.version || github.event.client_payload.version }}](https://github.com/ara-mesh/ara/releases/tag/${{ github.event.inputs.version || github.event.client_payload.version }}).
