name: release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: CGO_ENABLED=1 go test ./...
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
