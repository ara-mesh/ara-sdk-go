name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_amd64
            lib: libaraengine.so
            pattern: 'libaraengine-linux-amd64.so'
          - os: macos-latest
            platform: darwin_arm64
            lib: libaraengine.dylib
            pattern: 'libaraengine-darwin-arm64.dylib'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download libaraengine for ${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.ARA_ENGINE_TOKEN }}
        run: |
          gh release download --repo ara-mesh/ara --latest \
            --pattern "${{ matrix.pattern }}" \
            --dir lib/${{ matrix.platform }} \
            && mv lib/${{ matrix.platform }}/${{ matrix.pattern }} lib/${{ matrix.platform }}/${{ matrix.lib }} \
            || echo "No release found, using committed binaries"

      - run: CGO_ENABLED=1 go test ./...
